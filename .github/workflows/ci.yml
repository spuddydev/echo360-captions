name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and package check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: web-ext lint
        run: npm run web-ext

      - name: Build extension zip
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/*.zip
          if-no-files-found: error
